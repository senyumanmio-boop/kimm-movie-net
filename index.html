<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KimmMovie GOD MODE</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
  background:#020202;
  color:white;
  font-family:sans-serif;
  overflow-x:hidden;
}
.card:hover {
  transform:scale(1.08);
  transition:0.3s;
}
.glow:hover {
  box-shadow:0 0 25px red;
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="p-5 flex justify-between items-center bg-black/80 fixed w-full z-50">
  <h1 class="text-2xl font-bold text-red-600">KimmMovie GOD</h1>
  <input id="search" placeholder="Cari film / novel..." class="px-4 py-2 rounded bg-gray-800">
</header>

<div class="h-20"></div>

<!-- HERO -->
<section class="p-10 text-center">
  <h2 class="text-5xl font-bold mb-4">🔥 Hiburan Tanpa Batas 🔥</h2>
  <p class="text-gray-400">Film, Novel, Musik, AI Rekomendasi</p>
</section>

<!-- MOVIES -->
<section class="p-6">
  <h2 class="text-2xl mb-4">🎬 Film Trending</h2>
  <div id="movies" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
</section>

<!-- NOVELS -->
<section class="p-6">
  <h2 class="text-2xl mb-4">📚 Novel Tanpa Batas</h2>
  <div id="novels" class="grid md:grid-cols-3 gap-4"></div>
</section>

<!-- MUSIC -->
<section class="p-6 text-center">
  <h2 class="text-2xl mb-4">🎧 Music Mode</h2>
  <button onclick="toggleMusic()" class="bg-red-600 px-6 py-3 rounded glow">Play / Pause</button>
  <br><br>
  <input type="range" min="0" max="1" step="0.01" onchange="setVolume(this.value)">
</section>

<script>
// ================= MOVIE =================
const API = "https://api.themoviedb.org/3/trending/movie/day?api_key=1306003844bd5fa3d43d44726d5a9cb0";

async function loadMovies(){
  const res = await fetch(API);
  const data = await res.json();
  const container = document.getElementById("movies");

  data.results.forEach(m=>{
    const el = document.createElement("div");
    el.className="card glow cursor-pointer";
    el.innerHTML = `
      <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" />
      <p class="text-sm mt-2">${m.title}</p>
    `;
    container.appendChild(el);
  });
}

// ================= NOVEL API =================
const NOVEL_API = "https://api.sheety.co/197265d85f1f62a99d8c1da249ca7819/untitledSpreadsheet/sheet1";

async function loadNovels(){
  const res = await fetch(NOVEL_API);
  const data = await res.json();
  const container = document.getElementById("novels");

  (data.sheet1 || []).forEach(n=>{
    const el = document.createElement("div");
    el.className="bg-gray-900 p-4 rounded glow";
    el.innerHTML = `
      <h3 class="font-bold text-red-500">${n.title}</h3>
      <p class="text-gray-400 text-sm">${n.desc || "Tidak ada deskripsi"}</p>
    `;
    container.appendChild(el);
  });
}

// ================= MUSIC =================
const playlist = [
  "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
  "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
  "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
];

let index = 0;
const audio = new Audio(playlist[index]);

function toggleMusic(){
  if(audio.paused) audio.play();
  else audio.pause();
}

function setVolume(v){
  audio.volume = v;
}

// ================= AI RANDOM REKOMENDASI =================
function rekomendasiRandom(){
  const items = document.querySelectorAll("#movies div");
  items.forEach(i=> i.style.border="none");

  const random = items[Math.floor(Math.random()*items.length)];
  if(random) random.style.border="3px solid red";
}

setInterval(rekomendasiRandom, 5000);

// ================= INFINITE SCROLL =================
window.onscroll = ()=>{
  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 100){
    loadMovies();
  }
}

// ================= INIT =================
loadMovies();
loadNovels();

</script>

</body>
</html>
