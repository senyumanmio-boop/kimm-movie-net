<!DOCTYPE html>
<html lang="id">
<head>
     <meta name="google-site-verification" content="goUKxSl1VdNOaFmr59ZqWGze6dXHhyRH6BWPOMHYc8I" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KimmMovie Pro - Ultimate Edition</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/DZ3yMyM3/lalala-removebg-preview.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap');
        
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* HERO BANNER RESPONSIVE */
        #hero-banner {
            height: 50vh; /* Di HP lebih pendek biar gak raksasa */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end; /* Tulisan di bawah biar gak ketutup search */
            position: relative;
            padding: 20px 5%;
            transition: background 0.8s ease-in-out;
        }

        @media (min-width: 768px) {
            #hero-banner { height: 85vh; align-items: center; }
        }

        #hero-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #000 10%, transparent 90%), 
                        linear-gradient(to right, rgba(0,0,0,0.8) 0%, transparent 100%);
        }

        .hero-content { position: relative; z-index: 20; max-width: 700px; }

        /* SEARCH BAR FIX */
        .search-container {
            position: absolute;
            top: 20px;
            left: 5%;
            right: 5%;
            z-index: 100;
        }

        /* MOVIE CARD GRID (2 Kolom di HP) */
        .movie-card-grid {
            width: 100%;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        /* Gambar Poster Pas di Layar HP */
        .poster-img {
            height: 240px; /* Tinggi ideal buat HP */
            width: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        @media (min-width: 768px) {
            .poster-img { height: 350px; }
            .search-container { width: 300px; left: auto; right: 5%; }
        }

        /* HIDE SCROLLBAR */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="text-center px-6">
            <h1 class="text-5xl md:text-7xl font-black italic text-red-600 mb-2 tracking-tighter">Kimm<span class="text-white">Movie</span></h1>
            <p class="text-gray-500 mb-8 font-bold tracking-widest text-[10px] uppercase">Ultimate Streaming Portal</p>
            <input type="text" id="userNameInput" placeholder="Siapa namamu, bos?" class="bg-white/5 p-4 rounded-2xl mb-4 w-full max-w-xs text-center border border-white/10 outline-none focus:border-red-600 transition text-white font-bold">
            <br>
            <button onclick="handleLogin()" class="bg-red-600 w-full max-w-xs py-4 rounded-2xl font-black hover:bg-red-700 transition tracking-widest uppercase text-sm">Masuk</button>
        </div>
    </div>

    <div id="main-content" class="hidden opacity-0 transition-opacity duration-1000 pb-32">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Cari Film..." class="w-full bg-black/60 backdrop-blur-md border border-white/20 py-3 px-6 rounded-full outline-none focus:border-red-600 transition text-sm text-white">
        </div>

        <div id="tab-home" class="tab-content">
            <div id="hero-banner">
                <div class="hero-content">
                    <h1 id="hero-title" class="text-3xl md:text-7xl font-black italic mb-2 leading-none uppercase tracking-tighter text-white">...</h1>
                    <p id="hero-desc" class="text-gray-300 text-[10px] md:text-base mb-4 line-clamp-2 max-w-xl font-medium"></p>
                    <div class="flex gap-2">
                        <button id="hero-btn-nonton" class="bg-white text-black px-6 py-3 rounded-full font-black text-[10px] tracking-widest uppercase">Play</button>
                        <button id="hero-btn-trailer" class="bg-white/10 backdrop-blur-md border border-white/20 text-white px-6 py-3 rounded-full font-black text-[10px] tracking-widest uppercase">Trailer</button>
                    </div>
                </div>
            </div>

            <div class="py-6 space-y-8">
                <div class="px-5">
                    <h2 class="text-lg font-black italic uppercase tracking-tighter mb-4">Trending <span class="text-red-600">Minggu Ini</span></h2>
                    <div id="trending-list" class="flex gap-4 overflow-x-auto no-scrollbar scroll-smooth"></div>
                </div>

                <div class="px-5">
                    <h2 class="text-lg font-black italic uppercase tracking-tighter mb-4">Eksplorasi <span class="text-red-600">Film</span></h2>
                    <div id="home-recommend" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
                </div>
            </div>
        </div>
        
        <nav class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-2xl border-t border-white/5 z-[1000] py-4 flex justify-around items-center">
            <button onclick="pindahTab('home')" id="btn-home" class="flex flex-col items-center gap-1 text-red-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="text-[9px] font-black">Home</span>
            </button>
            <button onclick="pindahTab('movie')" id="btn-movie" class="flex flex-col items-center gap-1 text-gray-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M18 3v2h-2V3H8v2H6V3H4v18h2v-2h2v2h8v-2h2v2h2V3h-2zM8 17H6v-2h2v2zm0-4H6v-2h2v2zm0-4H6V7h2v2zm10 8h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2z"/></svg>
                <span class="text-[9px] font-black">Movies</span>
            </button>
        </nav>
    </div>

    <script>
        const API_KEY = '1306003844bd5fa3d43d44726d5a9cb0';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_PATH = 'https://image.tmdb.org/t/p/w500';

        function handleLogin() {
            const name = document.getElementById('userNameInput').value;
            if(name.trim() !== "") {
                document.getElementById('login-screen').style.display = 'none';
                const main = document.getElementById('main-content');
                main.classList.remove('hidden');
                main.style.opacity = '1';
                loadSemuaKategori();
                loadInfiniteMovies();
            }
        }

        async function loadSemuaKategori() {
            const res = await fetch(`${BASE_URL}/trending/movie/week?api_key=${API_KEY}`);
            const data = await res.json();
            setHero(data.results[0]);
            renderHorizontal(data.results, 'trending-list');
        }

        async function loadInfiniteMovies() {
            const res = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=id-ID&page=1`);
            const data = await res.json();
            renderGrid(data.results, 'home-recommend');
        }

        function renderHorizontal(movies, id) {
            const container = document.getElementById(id);
            container.innerHTML = movies.map(m => `
                <div onclick="window.open('https://vidsrc.to/embed/movie/${m.id}', '_blank')" class="min-w-[140px] max-w-[140px]">
                    <img src="${IMG_PATH + m.poster_path}" class="w-full h-48 object-cover rounded-xl border border-white/10">
                    <h3 class="text-[9px] font-bold mt-2 truncate uppercase">${m.title}</h3>
                </div>
            `).join('');
        }

        function renderGrid(movies, id) {
            const container = document.getElementById(id);
            container.innerHTML += movies.map(m => `
                <div onclick="window.open('https://vidsrc.to/embed/movie/${m.id}', '_blank')" class="movie-card-grid">
                    <img src="${IMG_PATH + m.poster_path}" class="poster-img border border-white/10">
                    <h3 class="text-[10px] font-black mt-2 truncate uppercase text-red-600">${m.title}</h3>
                </div>
            `).join('');
        }

        function setHero(m) {
            document.getElementById('hero-banner').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;
            document.getElementById('hero-title').innerText = m.title;
            document.getElementById('hero-desc').innerText = m.overview;
        }

        function pindahTab(t) {
            alert("Fitur tab menyusul, fokus benerin tampilan HP dulu bos!");
        }
    </script>
</body>
</html>
