<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KimmMovie Net - Pro Edition</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/DZ3yMyM3/lalala-removebg-preview.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* HERO BANNER STYLE */
        #hero-banner {
            height: 65vh;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            position: relative;
            padding: 20px 5%;
            transition: background 0.8s ease-in-out;
        }

        @media (min-width: 768px) {
            #hero-banner { height: 85vh; align-items: center; }
        }

        #hero-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #000 15%, transparent 100%),
                        linear-gradient(to right, rgba(0,0,0,0.7) 0%, transparent 100%);
        }

        .hero-content { position: relative; z-index: 20; max-width: 800px; }

        /* SEARCH CONTAINER STICKY */
        .search-container {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            padding: 15px 5%;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* MOVIE CARD STYLE */
        .poster-img {
            height: 260px;
            width: 100%;
            object-fit: cover;
            border-radius: 16px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .movie-card:hover .poster-img { 
            transform: scale(1.05); 
            border-color: #ef4444;
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.2);
        }

        @media (min-width: 768px) {
            .poster-img { height: 380px; }
        }

        /* HIDE SCROLLBAR */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #login-screen { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 9999; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: opacity 0.5s ease;
        }
        
        /* MODAL DETAIL */
        #movieModal { backdrop-filter: blur(30px); transition: 0.3s; }
        .cast-img { width: 65px; height: 65px; object-fit: cover; border-radius: 50%; border: 2px solid #ef4444; }

        .loader {
            width: 25px; height: 25px; border: 3px solid #333;
            border-bottom-color: #ef4444; border-radius: 50%;
            display: inline-block; animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="text-center px-6">
            <h1 class="text-7xl font-black italic text-red-600 mb-2 tracking-tighter">Kimm<span class="text-white">Movie</span></h1>
            <p class="text-gray-500 mb-10 font-bold tracking-[0.3em] text-[10px] uppercase">Batam Private Streaming</p>
            <input type="text" id="userNameInput" placeholder="Siapa namamu, bos?" class="bg-white/5 p-5 rounded-2xl mb-6 w-72 text-center border border-white/10 outline-none focus:border-red-600 transition text-white font-bold tracking-widest">
            <br>
            <button onclick="handleLogin()" class="bg-red-600 px-20 py-4 rounded-2xl font-black hover:bg-red-700 transition tracking-widest uppercase text-xs shadow-lg shadow-red-600/20">Masuk</button>
        </div>
    </div>

    <div id="main-content" class="hidden opacity-0 transition-opacity duration-1000 pb-32">
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Cari film, aktor, atau genre..." class="w-full bg-white/5 border border-white/10 py-4 px-8 rounded-full outline-none focus:border-red-600 transition text-sm text-white font-medium">
        </div>

        <div id="tab-home">
            <div id="hero-banner">
                <div class="hero-content">
                    <span class="bg-red-600 text-[10px] font-black px-4 py-1.5 rounded-full mb-6 inline-block tracking-tighter uppercase">Featured Movie</span>
                    <h1 id="hero-title" class="text-5xl md:text-9xl font-black italic mb-6 leading-none uppercase tracking-tighter text-white drop-shadow-2xl">...</h1>
                    <p id="hero-desc" class="text-gray-300 text-sm md:text-lg mb-10 line-clamp-3 max-w-2xl font-medium leading-relaxed italic"></p>
                    <div class="flex gap-4">
                        <button id="hero-btn-play" class="bg-white text-black px-12 py-4 rounded-full font-black text-xs uppercase tracking-widest hover:bg-red-600 hover:text-white transition-all">Play Now</button>
                    </div>
                </div>
            </div>

            <div class="py-12 space-y-16">
                <div class="px-6 md:px-12">
                    <h2 class="text-2xl font-black italic uppercase tracking-tighter mb-8 flex items-center gap-3">
                        <span class="w-2 h-8 bg-red-600 inline-block rounded-full"></span> Trending <span class="text-red-600">Now</span>
                    </h2>
                    <div id="trending-list" class="flex gap-6 overflow-x-auto no-scrollbar scroll-smooth p-2"></div>
                </div>

                <div class="px-6 md:px-12">
                    <h2 id="grid-title" class="text-2xl font-black italic uppercase tracking-tighter mb-8 flex items-center gap-3">
                        <span class="w-2 h-8 bg-red-600 inline-block rounded-full"></span> Koleksi <span class="text-red-600">Film</span>
                    </h2>
                    <div id="movie-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6 md:gap-10"></div>
                    
                    <div id="loading-trigger" class="py-24 text-center text-gray-600 font-bold text-[10px] uppercase tracking-[0.5em] flex flex-col items-center gap-4">
                        <span class="loader"></span>
                        Fetching more contents...
                    </div>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-2xl border-t border-white/5 z-[1000] py-5 flex justify-around items-center">
            <button onclick="location.reload()" class="flex flex-col items-center gap-1 text-red-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="text-[9px] font-black uppercase tracking-widest">Home</span>
            </button>
            <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="flex flex-col items-center gap-1 text-gray-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <span class="text-[9px] font-black uppercase tracking-widest">Cari</span>
            </button>
        </nav>
    </div>

    <div id="movieModal" class="hidden fixed inset-0 bg-black/98 z-[10000] flex items-center justify-center p-4">
        <div class="bg-[#0a0a0a] max-w-6xl w-full rounded-[40px] overflow-hidden relative border border-white/10 shadow-2xl overflow-y-auto max-h-[95vh] no-scrollbar">
            <button onclick="tutupModal()" class="absolute top-6 right-6 z-[100] bg-white/10 hover:bg-red-600 backdrop-blur-md w-12 h-12 rounded-full text-white text-3xl font-light transition-all flex items-center justify-center">&times;</button>
            <div id="modalContent" class="flex flex-col md:flex-row"></div>
        </div>
    </div>

    <script>
        const API_KEY = '1306003844bd5fa3d43d44726d5a9cb0';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_PATH = 'https://image.tmdb.org/t/p/w500';

        let currentPage = 1;
        let isLoading = false;
        let isSearching = false;

        // LOGIN HANDLER
        function handleLogin() {
            const name = document.getElementById('userNameInput').value;
            if(name.trim() !== "") {
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    const main = document.getElementById('main-content');
                    main.classList.remove('hidden');
                    setTimeout(() => main.style.opacity = '1', 100);
                    initApp();
                }, 500);
            }
        }

        // INITIAL DATA
        async function initApp() {
            try {
                const res = await fetch(`${BASE_URL}/trending/movie/week?api_key=${API_KEY}`);
                const data = await res.json();
                setHero(data.results[0]);
                renderHorizontal(data.results, 'trending-list');
                loadMovies(currentPage);
            } catch (err) { console.error("Gagal ambil data awal"); }
        }

        // LOAD MOVIES (PAGINATION)
        async function loadMovies(page) {
            if (isLoading || isSearching) return;
            isLoading = true;
            try {
                const res = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=id-ID&page=${page}`);
                const data = await res.json();
                renderGrid(data.results, 'movie-grid');
                isLoading = false;
            } catch (err) { isLoading = false; }
        }

        // SEARCH FUNCTION
        document.getElementById('searchInput').onkeyup = async function() {
            const query = this.value;
            const grid = document.getElementById('movie-grid');
            const title = document.getElementById('grid-title');
            
            if(query.length < 3) {
                if(isSearching) {
                    isSearching = false;
                    grid.innerHTML = "";
                    currentPage = 1;
                    loadMovies(currentPage);
                    title.innerHTML = `<span class="w-2 h-8 bg-red-600 inline-block rounded-full"></span> Koleksi <span class="text-red-600">Film</span>`;
                }
                return;
            }

            isSearching = true;
            title.innerHTML = `<span class="w-2 h-8 bg-blue-600 inline-block rounded-full"></span> Hasil Cari: <span class="text-blue-600">${query}</span>`;
            
            const res = await fetch(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${query}&language=id-ID`);
            const data = await res.json();
            grid.innerHTML = "";
            renderGrid(data.results, 'movie-grid');
        }

        // INFINITE SCROLL
        window.onscroll = () => {
            if (!isSearching && (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 1200) {
                currentPage++;
                loadMovies(currentPage);
            }
        };

        // RENDER FUNCTIONS
        function renderHorizontal(movies, id) {
            const container = document.getElementById(id);
            container.innerHTML = movies.map(m => `
                <div onclick="bukaDetail(${m.id})" class="min-w-[160px] md:min-w-[220px] cursor-pointer movie-card">
                    <img src="${IMG_PATH + m.poster_path}" class="w-full h-64 md:h-80 object-cover rounded-2xl border border-white/5 shadow-2xl">
                    <h3 class="text-[10px] font-black mt-3 truncate uppercase text-gray-500 tracking-widest">${m.title}</h3>
                </div>
            `).join('');
        }

        function renderGrid(movies, id) {
            const container = document.getElementById(id);
            container.innerHTML += movies.map(m => `
                <div onclick="bukaDetail(${m.id})" class="cursor-pointer movie-card">
                    <img src="${m.poster_path ? IMG_PATH + m.poster_path : 'https://via.placeholder.com/500x750'}" class="poster-img shadow-2xl">
                    <h3 class="text-[11px] font-black mt-3 truncate uppercase text-red-600 tracking-tighter">${m.title}</h3>
                    <p class="text-[9px] text-gray-600 font-bold tracking-widest uppercase">${m.release_date ? m.release_date.split('-')[0] : 'N/A'}</p>
                </div>
            `).join('');
        }

        // DETAIL MODAL LOGIC (INCL. CAST NAMES)
        async function bukaDetail(id) {
            const res = await fetch(`${BASE_URL}/movie/${id}?api_key=${API_KEY}&language=id-ID&append_to_response=credits,videos`);
            const m = await res.json();
            
            // LOGIC NAMA AKTOR
            const castHtml = m.credits.cast.slice(0, 6).map(c => `
                <div class="flex flex-col items-center gap-2 min-w-[90px]">
                    <img src="${c.profile_path ? 'https://image.tmdb.org/t/p/w200' + c.profile_path : 'https://via.placeholder.com/100'}" class="cast-img shadow-lg">
                    <p class="text-[10px] font-black text-center leading-tight text-white uppercase tracking-tighter">${c.name}</p>
                    <p class="text-[8px] text-red-600 font-bold uppercase tracking-widest text-center line-clamp-1">${c.character}</p>
                </div>
            `).join('');

            document.getElementById('modalContent').innerHTML = `
                <div class="w-full md:w-1/2 relative h-[500px] md:h-auto">
                    <img src="${IMG_PATH + m.poster_path}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-transparent to-transparent"></div>
                </div>
                <div class="p-10 md:p-16 flex flex-col justify-center bg-[#0a0a0a] md:w-1/2">
                    <h2 class="text-4xl md:text-6xl font-black italic mb-4 uppercase text-white leading-none tracking-tighter">${m.title}</h2>
                    <div class="flex gap-4 mb-8 items-center">
                        <span class="text-yellow-500 font-black text-sm italic">⭐ ${m.vote_average.toFixed(1)}</span>
                        <span class="text-gray-400 font-bold text-xs uppercase tracking-widest">${m.release_date.split('-')[0]}</span>
                        <span class="border border-red-600 text-red-600 px-2 py-0.5 rounded text-[10px] font-black uppercase italic">Ultra HD</span>
                    </div>
                    <p class="text-gray-400 text-xs md:text-sm mb-10 leading-relaxed font-medium italic">${m.overview}</p>
                    
                    <h4 class="text-[11px] font-black uppercase text-white tracking-[0.3em] mb-6 border-b border-red-600 w-fit pb-1">Main Cast</h4>
                    <div class="flex gap-6 mb-10 overflow-x-auto no-scrollbar pb-4">
                        ${castHtml}
                    </div>

                    <button onclick="window.open('https://vidsrc.to/embed/movie/${id}', '_blank')" class="bg-red-600 py-5 rounded-2xl font-black text-[12px] uppercase tracking-[0.2em] text-white shadow-xl hover:scale-105 transition-all">Start Streaming</button>
                </div>
            `;
            document.getElementById('movieModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function tutupModal() {
            document.getElementById('movieModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function setHero(m) {
            document.getElementById('hero-banner').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;
            document.getElementById('hero-title').innerText = m.title;
            document.getElementById('hero-desc').innerText = m.overview;
            document.getElementById('hero-btn-play').onclick = () => bukaDetail(m.id);
        }
    </script>
</body>
</html>
