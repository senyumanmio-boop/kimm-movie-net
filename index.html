<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>KimmMovie Net - The Ultimate Experience</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/DZ3yMyM3/lalala-removebg-preview.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --accent: #ff0000; --bg: #030303; --glass: rgba(255, 255, 255, 0.05); }
        body { background-color: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 50px; }
        .glass { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .hero-shadow { background: linear-gradient(0deg, var(--bg) 5%, transparent 100%), linear-gradient(90deg, rgba(0,0,0,0.9) 0%, transparent 60%); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-pop { animation: fadeIn 0.6s ease forwards; }
        .card-hover { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-hover:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 40px rgba(255, 0, 0, 0.15); border-color: var(--accent); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeIn 0.5s ease; }
        .music-visualizer span { display: inline-block; width: 3px; background: var(--accent); animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { height: 2px; } to { height: 15px; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

<div id="login-screen" class="fixed inset-0 bg-black z-[99999] flex flex-col items-center justify-center transition-all duration-1000">
    <div class="relative mb-8 text-center">
        <h1 class="text-8xl font-black italic text-red-600 tracking-tighter opacity-20 absolute -top-4 left-1/2 -translate-x-1/2 w-full">KIM</h1>
        <h1 class="text-7xl font-black italic relative z-10 tracking-tighter">Kimm<span class="text-red-600">Movie</span></h1>
    </div>
    <input type="text" id="userNameInput" placeholder="Siapa nama kodinger hari ini?" class="bg-white/5 border border-white/10 p-5 rounded-2xl w-80 text-center text-xl font-bold outline-none focus:border-red-600 focus:ring-4 focus:ring-red-600/20 transition-all mb-6 text-white" />
    <button onclick="handleLogin()" class="bg-red-600 px-12 py-5 rounded-2xl font-black uppercase tracking-widest hover:scale-105 active:scale-95 transition-all shadow-2xl shadow-red-600/30">Enter Workspace</button>
</div>

<div id="app" class="hidden opacity-0 transition-opacity duration-1000">
    <nav class="fixed top-0 w-full z-[1000] glass px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-6">
            <span class="text-3xl font-black italic text-red-600">K<span class="text-white">M</span></span>
            <div class="hidden md:flex flex-col text-[10px] font-black uppercase tracking-widest text-gray-400">
                <span class="text-green-500">● Live Server Batam</span>
                <span id="user-display text-white">User: Kim</span>
            </div>
        </div>
        <div class="relative w-1/2 max-w-md flex items-center">
            <i class="fa fa-search absolute left-4 text-gray-500 text-xs"></i>
            <input type="text" id="searchInput" placeholder="Cari Film..." class="w-full bg-white/5 border border-white/10 py-2.5 pl-12 pr-6 rounded-xl text-sm outline-none focus:bg-white/10 focus:border-red-600 transition-all text-white" />
        </div>
    </nav>

    <main class="pt-20">
        <div class="flex justify-center gap-2 mb-6 mt-4 overflow-x-auto no-scrollbar px-4">
            <button onclick="switchTab('pane-movies', this)" class="nav-btn px-6 py-2 rounded-full bg-red-600 text-white font-bold uppercase text-xs transition">Stream</button>
            <button onclick="switchTab('pane-novels', this)" class="nav-btn px-6 py-2 rounded-full bg-white/5 text-gray-400 font-bold uppercase text-xs hover:bg-white/10 transition">Novels</button>
            <button onclick="switchTab('pane-music', this)" class="nav-btn px-6 py-2 rounded-full bg-white/5 text-gray-400 font-bold uppercase text-xs hover:bg-white/10 transition">Lofi</button>
            <button onclick="switchTab('pane-profile', this)" class="nav-btn px-6 py-2 rounded-full bg-white/5 text-gray-400 font-bold uppercase text-xs hover:bg-white/10 transition">Profil</button>
        </div>

        <section id="pane-movies" class="tab-panel active">
            <div id="hero" class="relative h-[70vh] w-full flex items-center px-[5%] overflow-hidden bg-cover bg-center transition-all duration-700 rounded-b-[40px]">
                <div class="absolute inset-0 hero-shadow"></div>
                <div class="relative z-10 max-w-3xl">
                    <h1 id="hero-title" class="text-4xl md:text-7xl font-black italic uppercase leading-none mb-4 tracking-tighter">Loading...</h1>
                    <p id="hero-desc" class="text-gray-400 text-sm md:text-lg mb-8 line-clamp-3 font-medium"></p>
                    <div class="flex gap-4">
                        <button id="play-btn" class="bg-white text-black px-8 py-4 rounded-xl font-black text-xs uppercase flex items-center gap-3 hover:bg-red-600 hover:text-white transition"><i class="fa fa-play"></i> Watch Now</button>
                    </div>
                </div>
            </div>
            <div class="p-6 space-y-12">
                <h2 class="text-2xl font-black italic uppercase flex items-center gap-3"><i class="fa fa-fire text-red-600"></i> Koleksi <span class="text-red-600">Terbaru</span></h2>
                <div id="movie-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 lg:grid-cols-6 gap-6"></div>
            </div>
        </section>

        <section id="pane-novels" class="tab-panel p-8 max-w-6xl mx-auto hidden">
            <div class="mb-8">
                <h1 class="text-5xl font-black italic tracking-tighter">Kimm<span class="text-red-600">Lib</span></h1>
                <input type="text" id="search-novel" placeholder="Cari judul novel..." class="w-full mt-6 p-4 rounded-2xl border border-white/10 bg-white/5 text-white focus:border-red-600 outline-none transition" />
            </div>
            <div id="novel-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>

        <section id="pane-music" class="tab-panel p-8 max-w-4xl mx-auto hidden">
            <div class="glass p-12 rounded-[50px] text-center">
                <div class="music-visualizer mb-8 flex items-end justify-center gap-1 h-16">
                    <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                </div>
                <h2 class="text-4xl font-black italic mb-2 uppercase">Kimm<span class="text-red-600">Lofi</span></h2>
                <div class="flex items-center justify-center gap-8 mt-10">
                    <button onclick="prevTrack()" class="text-2xl"><i class="fa fa-backward"></i></button>
                    <button id="lofi-play-btn" onclick="toggleLofi()" class="bg-red-600 w-20 h-20 rounded-full text-3xl flex items-center justify-center shadow-xl"><i class="fa fa-play"></i></button>
                    <button onclick="nextTrack()" class="text-2xl"><i class="fa fa-forward"></i></button>
                </div>
            </div>
        </section>

        <section id="pane-profile" class="tab-panel p-8 max-w-3xl mx-auto hidden">
            <div class="glass p-8 rounded-[40px] flex flex-col md:flex-row gap-8 items-center">
                <img src="https://i.postimg.cc/DZ3yMyM3/lalala-removebg-preview.png" class="w-40 h-40 rounded-full bg-red-600/20 p-2 border border-red-600" />
                <div class="text-center md:text-left">
                    <h2 id="profile-name" class="text-4xl font-black italic mb-2">Kim Robi</h2>
                    <p class="text-gray-400 mb-4">Frontend Developer | Batam, ID</p>
                    <div class="flex gap-4 justify-center md:justify-start">
                        <a href="#" class="text-xl hover:text-red-600"><i class="fab fa-github"></i></a>
                        <a href="#" class="text-xl hover:text-red-600"><i class="fab fa-instagram"></i></a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="movieModal" class="fixed inset-0 z-[10000] hidden bg-black/95 overflow-y-auto p-4 md:p-12">
        <button onclick="closeModal()" class="fixed top-8 right-8 text-4xl z-50 hover:text-red-600">&times;</button>
        <div id="modalData" class="max-w-6xl mx-auto mt-10"></div>
    </div>

    <div id="readerModal" class="fixed inset-0 z-[10000] hidden bg-black overflow-y-auto p-6 md:p-20">
        <button onclick="closeReader()" class="fixed top-8 right-8 text-4xl z-50">&times;</button>
        <div id="readerContent" class="max-w-3xl mx-auto prose prose-invert"></div>
    </div>
</div>

<script>
    const MOVIE_API_KEY = '1306003844bd5fa3d43d44726d5a9cb0';
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMG_URL = 'https://image.tmdb.org/t/p/original';
    const POSTER_URL = 'https://image.tmdb.org/t/p/w500';
    const NOVEL_API_URL = 'https://api.sheety.co/40744eda28ba4514b7bcf2e4f9d38dd3/untitledSpreadsheet/sheet1';
    
    let moviePage = 1;
    let lofiAudio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
    let isLofiPlaying = false;

    function handleLogin() {
        const name = document.getElementById('userNameInput').value || 'Kim';
        document.getElementById('user-display').innerText = `User: ${name}`;
        document.getElementById('profile-name').innerText = name;
        document.getElementById('login-screen').classList.add('opacity-0', 'pointer-events-none');
        setTimeout(() => {
            document.getElementById('app').classList.remove('hidden');
            setTimeout(() => document.getElementById('app').style.opacity = '1', 100);
            initApp();
        }, 800);
    }

    async function initApp() {
        fetchMovies();
        fetchNovels();
    }

    async function fetchMovies() {
        try {
            const res = await fetch(`${BASE_URL}/movie/popular?api_key=${MOVIE_API_KEY}&page=${moviePage}`);
            const data = await res.json();
            if(moviePage === 1) setHero(data.results[0]);
            renderMovies(data.results);
            moviePage++;
        } catch (e) { console.error("Movie Error:", e); }
    }

    function setHero(m) {
        if (!m) return;
        const hero = document.getElementById('hero');
        hero.style.backgroundImage = `url(${IMG_URL + m.backdrop_path})`;
        document.getElementById('hero-title').innerText = m.title;
        document.getElementById('hero-desc').innerText = m.overview;
        document.getElementById('play-btn').onclick = () => openMovie(m.id);
    }

    function renderMovies(movies) {
        const grid = document.getElementById('movie-grid');
        movies.forEach(m => {
            if (!m.poster_path) return;
            const card = document.createElement('div');
            card.className = 'card-hover cursor-pointer group';
            card.onclick = () => openMovie(m.id);
            card.innerHTML = `
                <div class="relative rounded-2xl overflow-hidden bg-white/5 border border-white/10 aspect-[2/3]">
                    <img src="${POSTER_URL + m.poster_path}" class="w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent opacity-0 group-hover:opacity-100 transition-all flex items-end p-4">
                        <button class="bg-red-600 w-full py-2 rounded-lg text-xs font-bold">DETAIL</button>
                    </div>
                </div>
                <h3 class="text-[10px] font-black mt-3 truncate uppercase tracking-tighter text-gray-400 group-hover:text-red-600 transition">${m.title}</h3>
            `;
            grid.appendChild(card);
        });
    }

    async function openMovie(id) {
        const res = await fetch(`${BASE_URL}/movie/${id}?api_key=${MOVIE_API_KEY}&append_to_response=videos&language=id-ID`);
        const m = await res.json();
        const trailer = m.videos.results.find(v => v.type === 'Trailer') || m.videos.results[0];
        
        document.getElementById('modalData').innerHTML = `
            <div class="flex flex-col lg:flex-row gap-12 mb-12">
                <img src="${POSTER_URL + m.poster_path}" class="w-full lg:w-1/3 rounded-[30px] shadow-2xl" />
                <div class="flex-1">
                    <h1 class="text-6xl font-black italic text-red-600 mb-6 uppercase tracking-tighter">${m.title}</h1>
                    <p class="text-xl text-gray-300 mb-8 leading-relaxed">${m.overview || 'No description available.'}</p>
                    <button onclick="window.open('https://vidsrc.to/embed/movie/${id}', '_blank')" class="bg-white text-black px-12 py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-red-600 hover:text-white transition shadow-xl">Stream Now</button>
                </div>
            </div>
            ${trailer ? `<div class="aspect-video rounded-[30px] overflow-hidden border border-white/10"><iframe class="w-full h-full" src="https://www.youtube.com/embed/${trailer.key}" frameborder="0" allowfullscreen></iframe></div>` : ''}
        `;
        document.getElementById('movieModal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('movieModal').classList.add('hidden');
        document.body.style.overflow = 'auto';
        document.getElementById('modalData').innerHTML = '';
    }

    async function fetchNovels() {
        const grid = document.getElementById('novel-grid');
        grid.innerHTML = '<p class="text-red-600 animate-pulse font-bold">Menghubungkan ke KimLibrary...</p>';
        try {
            const res = await fetch(NOVEL_API_URL);
            const data = await res.json();
            const novels = data.sheet1;
            grid.innerHTML = novels.map(n => `
                <div onclick='openNovel(${JSON.stringify(n).replace(/'/g, "&apos;")})' class="glass p-6 rounded-[30px] flex gap-6 border border-white/5 hover:border-red-600 transition-all cursor-pointer group">
                    <img src="${n.cover || 'https://via.placeholder.com/150x225'}" class="w-24 h-36 object-cover rounded-xl" />
                    <div class="flex flex-col justify-center">
                        <span class="text-red-600 font-black text-[10px] tracking-widest uppercase mb-1">${n.category || 'NOVEL'}</span>
                        <h3 class="text-xl font-black italic uppercase">${n.title}</h3>
                        <p class="text-gray-500 text-xs mt-2 line-clamp-2">${n.author || 'Anonymous'}</p>
                    </div>
                </div>
            `).join('');
        } catch (e) { grid.innerHTML = "<p class='text-gray-500'>Gagal memuat novel.</p>"; }
    }

    function openNovel(n) {
        document.getElementById('readerContent').innerHTML = `
            <h1 class="text-4xl font-black text-red-600 mb-4">${n.title}</h1>
            <p class="text-gray-500 mb-10 italic">By ${n.author}</p>
            <div class="text-gray-200 leading-loose text-lg">${n.content ? n.content.replace(/\n/g, '<br>') : 'Konten kosong.'}</div>
        `;
        document.getElementById('readerModal').classList.remove('hidden');
    }

    function closeReader() { document.getElementById('readerModal').classList.add('hidden'); }

    function switchTab(paneId, btn) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(paneId).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => {
            b.classList.remove('bg-red-600', 'text-white');
            b.classList.add('bg-white/5', 'text-gray-400');
        });
        btn.classList.add('bg-red-600', 'text-white');
    }

    function toggleLofi() {
        const btn = document.getElementById('lofi-play-btn').querySelector('i');
        if(!isLofiPlaying) {
            lofiAudio.play();
            btn.classList.replace('fa-play', 'fa-pause');
        } else {
            lofiAudio.pause();
            btn.classList.replace('fa-pause', 'fa-play');
        }
        isLofiPlaying = !isLofiPlaying;
    }

    window.onscroll = () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 1000) {
            if(document.getElementById('pane-movies').classList.contains('active')) fetchMovies();
        }
    };
</script>
</body>
</html>
