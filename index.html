<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KimmMovie Net - Portal Pro</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/DZ3yMyM3/lalala-removebg-preview.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap');
        
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; margin: 0; }

        /* Hero Banner ala MovieBox */
        #hero-banner {
            height: 75vh;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            position: relative;
        }

        #hero-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #000 5%, transparent 95%);
        }

        .hero-content { position: relative; z-index: 10; padding: 40px; max-width: 800px; }

        /* Movie Card Style */
        .movie-card { background: #111; border-radius: 12px; transition: 0.3s; overflow: hidden; }
        .movie-card:hover { transform: scale(1.05); }

        .btn-cat { background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 20px; font-size: 12px; font-weight: bold; transition: 0.3s; }
        .btn-cat.active { background: #e50914; }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="text-center px-6">
            <h1 class="text-6xl font-black italic text-red-600 mb-8">KimmMovie</h1>
            <input type="text" id="userNameInput" placeholder="Nama Kamu..." class="bg-white/10 p-4 rounded-xl mb-4 w-64 text-center border border-white/20 outline-none focus:border-red-600 transition">
            <br>
            <button onclick="handleLogin()" class="bg-red-600 px-12 py-3 rounded-xl font-bold hover:bg-red-700 transition">MASUK</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div id="hero-banner">
            <div class="hero-content">
                <h1 id="hero-title" class="text-5xl md:text-7xl font-black italic mb-4">Loading...</h1>
                <p id="hero-desc" class="text-gray-300 text-sm md:base mb-6 line-clamp-3 max-w-xl"></p>
                <button id="hero-btn-nonton" class="bg-red-600 px-10 py-3 rounded-full font-black hover:bg-red-700 transition">NONTON SEKARANG</button>
            </div>
        </div>

        <div class="p-6">
            <h2 class="text-2xl font-black italic mb-6">TRENDING <span class="text-red-600">SEKARANG</span></h2>
            
            <div class="flex gap-3 mb-8 overflow-x-auto hide-scrollbar">
                <button onclick="filterKategori('Semua', this)" class="btn-cat active">Semua</button>
                <button onclick="filterKategori('Horor', this)" class="btn-cat">Horor</button>
                <button onclick="filterKategori('Komedi', this)" class="btn-cat">Komedi</button>
                <button onclick="filterKategori('Animasi', this)" class="btn-cat">Animasi</button>
            </div>

            <div id="movie-list" class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>

            <div class="flex justify-center mt-12 mb-20">
                <button id="btnLoadMore" onclick="loadNextPage()" class="bg-white/10 px-12 py-3 rounded-full font-bold hover:bg-white/20 border border-white/10 transition">LIHAT LEBIH BANYAK</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '1306003844bd5fa3d43d44726d5a9cb0';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_PATH = 'https://image.tmdb.org/t/p/w500';

        let currentPage = 1;
        let currentUrl = `${BASE_URL}/movie/popular?api_key=${API_KEY}&language=id-ID`;

        function handleLogin() {
            const name = document.getElementById('userNameInput').value;
            if(name.trim() !== "") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').classList.remove('hidden');
                ambilDataFilm(currentUrl);
            } else { alert("Isi nama dulu bos!"); }
        }

        async function ambilDataFilm(url, isAppend = false) {
            try {
                const res = await fetch(`${url}&page=${currentPage}`);
                const data = await res.json();
                if (currentPage === 1) setHero(data.results[0]);
                tampilkanFilm(data.results, isAppend);
            } catch (err) { console.error(err); }
        }

        function setHero(movie) {
            if(!movie) return;
            document.getElementById('hero-banner').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${movie.backdrop_path})`;
            document.getElementById('hero-title').innerText = movie.title;
            document.getElementById('hero-desc').innerText = movie.overview || "No description available.";
            document.getElementById('hero-btn-nonton').onclick = () => window.open(`https://vidsrc.to/embed/movie/${movie.id}`, '_blank');
        }

        function tampilkanFilm(movies, isAppend) {
            const container = document.getElementById('movie-list');
            if(!isAppend) container.innerHTML = "";

            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = "movie-card";
                const linkNonton = `https://vidsrc.to/embed/movie/${movie.id}`;
                
                card.innerHTML = `
                    <div class="relative group h-72">
                        <img src="${movie.poster_path ? IMG_PATH + movie.poster_path : 'https://via.placeholder.com/500'}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/80 opacity-0 group-hover:opacity-100 transition flex flex-col items-center justify-center p-4 gap-2">
                             <a href="${linkNonton}" target="_blank" class="bg-red-600 text-white w-full py-2 rounded-lg text-center text-[10px] font-bold">NONTON</a>
                             <button onclick="getTrailer(${movie.id})" class="bg-gray-700 text-white w-full py-2 rounded-lg text-[10px] font-bold">TRAILER</button>
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-bold text-[11px] truncate">${movie.title}</h3>
                        <p class="text-yellow-500 text-[10px] font-bold mt-1">⭐ ${movie.vote_average.toFixed(1)}</p>
                    </div>`;
                container.appendChild(card);
            });
        }

        async function getTrailer(id) {
            const res = await fetch(`${BASE_URL}/movie/${id}/videos?api_key=${API_KEY}`);
            const data = await res.json();
            const trailer = data.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');
            if(trailer) window.open(`https://www.youtube.com/watch?v=${trailer.key}`, '_blank');
            else alert("Trailer belum tersedia.");
        }

        function loadNextPage() {
            currentPage++;
            ambilDataFilm(currentUrl, true);
        }

        function filterKategori(kat, btn) {
            document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentPage = 1;
            if(kat === 'Horor') currentUrl = `${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=27&language=id-ID`;
            else if(kat === 'Komedi') currentUrl = `${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=35&language=id-ID`;
            else if(kat === 'Animasi') currentUrl = `${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=16&language=id-ID`;
            else currentUrl = `${BASE_URL}/movie/popular?api_key=${API_KEY}&language=id-ID`;
            ambilDataFilm(currentUrl, false);
        }
    </script>
</body>
</html>
