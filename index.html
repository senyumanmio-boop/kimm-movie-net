<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KimmMovie Pro - Ultimate Edition</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/DZ3yMyM3/lalala-removebg-preview.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap');
        
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* HERO BANNER */
        #hero-banner {
            height: 85vh;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 5%;
        }

        #hero-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, #000 20%, transparent 100%), 
                        linear-gradient(to top, #000 10%, transparent 40%);
        }

        .hero-content { position: relative; z-index: 20; max-width: 700px; }

        /* SEARCH BAR */
        .search-container {
            position: absolute;
            top: 30px;
            right: 5%;
            z-index: 100;
            width: 300px;
        }

        /* MOVIE CARD */
        .movie-card {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            cursor: pointer;
        }
        
        .movie-card:hover { transform: scale(1.08); z-index: 50; box-shadow: 0 20px 25px -5px rgba(229, 9, 20, 0.3); }

        .btn-cat { 
            background: rgba(255,255,255,0.05); 
            padding: 10px 24px; 
            border-radius: 30px; 
            font-size: 12px; 
            font-weight: 800;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-cat.active { background: #e50914; border-color: #e50914; box-shadow: 0 0 15px rgba(229, 9, 20, 0.5); }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        
        /* MODAL BLUR */
        #movieModal { backdrop-filter: blur(10px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="text-center px-6">
            <h1 class="text-7xl font-black italic text-red-600 mb-2 tracking-tighter">Kimm<span class="text-white">Movie</span></h1>
            <p class="text-gray-500 mb-8 font-bold tracking-widest text-xs">ULTIMATE STREAMING PORTAL</p>
            <input type="text" id="userNameInput" placeholder="Siapa namamu, bos?" class="bg-white/5 p-4 rounded-2xl mb-4 w-72 text-center border border-white/10 outline-none focus:border-red-600 transition text-white">
            <br>
            <button onclick="handleLogin()" class="bg-red-600 px-16 py-4 rounded-2xl font-black hover:bg-red-700 transition tracking-widest">ENTER</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Cari film... (Enter)" class="w-full bg-black/40 backdrop-blur-md border border-white/20 py-3 px-6 rounded-full outline-none focus:border-red-600 transition text-sm">
        </div>

        <div id="hero-banner">
            <div class="hero-content">
                <span class="bg-red-600 text-[10px] font-black px-3 py-1 rounded-sm mb-4 inline-block tracking-tighter">TOP TRENDING</span>
                <h1 id="hero-title" class="text-6xl md:text-8xl font-black italic mb-4 leading-none uppercase">...</h1>
                <p id="hero-desc" class="text-gray-300 text-sm md:text-base mb-8 line-clamp-3 max-w-xl font-medium"></p>
                <div class="flex gap-4">
                    <button id="hero-btn-nonton" class="bg-white text-black px-10 py-4 rounded-full font-black hover:bg-red-600 hover:text-white transition duration-500 shadow-xl">PLAY NOW</button>
                    <button id="hero-btn-trailer" class="bg-white/10 backdrop-blur-md border border-white/20 text-white px-10 py-4 rounded-full font-black hover:bg-white/20 transition duration-500">TRAILER</button>
                </div>
            </div>
        </div>

        <div class="p-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-6">
                <h2 class="text-3xl font-black italic tracking-tighter uppercase">Explore <span class="text-red-600">Movies</span></h2>
                <div class="flex gap-3 overflow-x-auto hide-scrollbar">
                    <button onclick="filterKategori('Semua', this)" class="btn-cat active">Semua</button>
                    <button onclick="filterKategori('Horor', this)" class="btn-cat">Horor</button>
                    <button onclick="filterKategori('Komedi', this)" class="btn-cat">Komedi</button>
                    <button onclick="filterKategori('Animasi', this)" class="btn-cat">Animasi</button>
                    <button onclick="filterKategori('Action', this)" class="btn-cat">Action</button>
                </div>
            </div>

            <div id="movie-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 lg:grid-cols-6 gap-8">
                </div>

            <div class="flex flex-col items-center justify-center mt-20 mb-32">
                <button id="btnLoadMore" onclick="loadNextPage()" class="bg-white text-black px-16 py-4 rounded-full font-black hover:bg-red-600 hover:text-white transition-all transform hover:scale-110 uppercase text-xs tracking-widest">Lihat Lebih Banyak</button>
            </div>
        </div>
    </div>

    <div id="movieModal" class="hidden fixed inset-0 bg-black/95 z-[10000] flex items-center justify-center p-4">
        <div class="bg-[#111] max-w-5xl w-full rounded-3xl overflow-hidden relative border border-white/10 shadow-2xl">
            <button onclick="tutupModal()" class="absolute top-5 right-5 z-50 bg-black/50 w-10 h-10 rounded-full flex items-center justify-center text-2xl font-bold hover:bg-red-600 transition">&times;</button>
            <div id="modalContent" class="flex flex-col md:flex-row">
                </div>
        </div>
    </div>

    <script>
        const API_KEY = '1306003844bd5fa3d43d44726d5a9cb0';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_PATH = 'https://image.tmdb.org/t/p/w500';

        let currentPage = 1;
        let currentUrl = `${BASE_URL}/movie/popular?api_key=${API_KEY}&language=id-ID`;

        function handleLogin() {
            const name = document.getElementById('userNameInput').value;
            if(name.trim() !== "") {
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-content').classList.remove('hidden');
                    ambilDataFilm(currentUrl);
                }, 500);
            } else { alert("Isi nama dulu bos!"); }
        }

        async function ambilDataFilm(url, isAppend = false) {
            try {
                const res = await fetch(`${url}&page=${currentPage}`);
                const data = await res.json();
                if (currentPage === 1 && data.results.length > 0) setHero(data.results[0]);
                tampilkanFilm(data.results, isAppend);
            } catch (err) { console.error(err); }
        }

        function setHero(movie) {
            if(!movie) return;
            document.getElementById('hero-banner').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${movie.backdrop_path})`;
            document.getElementById('hero-title').innerText = movie.title;
            document.getElementById('hero-desc').innerText = movie.overview || "Nikmati tontonan berkualitas tinggi di KimmMovie.";
            document.getElementById('hero-btn-nonton').onclick = () => window.open(`https://vidsrc.to/embed/movie/${movie.id}`, '_blank');
            document.getElementById('hero-btn-trailer').onclick = () => getTrailer(movie.id);
        }

        function tampilkanFilm(movies, isAppend) {
            const container = document.getElementById('movie-list');
            if(!isAppend) container.innerHTML = "";

            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = "movie-card";
                card.onclick = () => bukaDetail(movie.id); // Klik kartu buka detail

                const year = movie.release_date ? movie.release_date.split('-')[0] : 'N/A';
                
                card.innerHTML = `
                    <div class="relative group h-80">
                        <img src="${movie.poster_path ? IMG_PATH + movie.poster_path : 'https://via.placeholder.com/500'}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-all duration-300 flex flex-col items-center justify-center p-6 gap-3">
                             <div class="bg-red-600 text-white p-3 rounded-full shadow-lg">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                             </div>
                             <span class="text-[10px] font-black tracking-widest uppercase">Lihat Detail</span>
                        </div>
                    </div>
                    <div class="p-4 bg-[#0a0a0a]">
                        <h3 class="font-black text-[11px] truncate uppercase tracking-tighter">${movie.title}</h3>
                        <div class="flex items-center justify-between mt-2">
                            <p class="text-gray-500 text-[9px] font-bold">${year}</p>
                            <p class="text-yellow-500 text-[9px] font-black italic">⭐ ${movie.vote_average.toFixed(1)}</p>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }

        // FUNGSI UTAMA UNTUK AKTOR & DETAIL
        async function bukaDetail(id) {
            try {
                // Ambil data detail & credits (aktor) sekaligus
                const res = await fetch(`${BASE_URL}/movie/${id}?api_key=${API_KEY}&append_to_response=credits`);
                const movie = await res.json();
                
                const modal = document.getElementById('movieModal');
                const content = document.getElementById('modalContent');
                
                // Ambil 5 aktor teratas
                const casts = movie.credits.cast.slice(0, 5).map(c => c.name).join(", ");
                
                content.innerHTML = `
                    <img src="${IMG_PATH + movie.poster_path}" class="w-full md:w-2/5 object-cover h-[500px] md:h-auto">
                    <div class="p-10 flex flex-col justify-center">
                        <h2 class="text-4xl md:text-6xl font-black mb-4 italic leading-none uppercase">${movie.title}</h2>
                        <div class="flex gap-4 mb-6 text-sm font-bold text-red-600 italic">
                            <span>⭐ ${movie.vote_average.toFixed(1)}</span>
                            <span>📅 ${movie.release_date ? movie.release_date.split('-')[0] : 'N/A'}</span>
                        </div>
                        <p class="text-gray-300 text-sm md:text-base mb-8 leading-relaxed font-medium">${movie.overview || 'Tidak ada deskripsi untuk film ini.'}</p>
                        
                        <div class="mb-10">
                            <h4 class="text-[10px] text-gray-500 uppercase font-black tracking-[0.2em] mb-2">Aktor Utama</h4>
                            <p class="text-xs font-bold text-white uppercase italic">${casts || 'Informasi aktor tidak ditemukan'}</p>
                        </div>

                        <div class="flex gap-4">
                            <button onclick="window.open('https://vidsrc.to/embed/movie/${id}', '_blank')" class="bg-red-600 px-10 py-4 rounded-full font-black text-[10px] tracking-widest hover:bg-red-700 transition shadow-lg">NONTON SEKARANG</button>
                            <button onclick="getTrailer(${id})" class="bg-white/10 px-10 py-4 rounded-full font-black text-[10px] tracking-widest hover:bg-white/20 transition border border-white/10">TRAILER</button>
                        </div>
                    </div>
                `;
                modal.classList.remove('hidden');
                document.body.style.overflow = 'hidden'; // Kunci scroll saat modal buka
            } catch (err) { console.error("Gagal ambil detail:", err); }
        }

        function tutupModal() {
            document.getElementById('movieModal').classList.add('hidden');
            document.body.style.overflow = 'auto'; // Aktifkan scroll lagi
        }

        async function getTrailer(id) {
            const res = await fetch(`${BASE_URL}/movie/${id}/videos?api_key=${API_KEY}`);
            const data = await res.json();
            const trailer = data.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');
            if(trailer) window.open(`https://www.youtube.com/watch?v=${trailer.key}`, '_blank');
            else alert("Trailer belum tersedia.");
        }

        function loadNextPage() {
            currentPage++;
            ambilDataFilm(currentUrl, true);
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value;
                currentPage = 1;
                if(query) {
                    currentUrl = `${BASE_URL}/search/movie?api_key=${API_KEY}&query=${query}&language=id-ID`;
                } else {
                    currentUrl = `${BASE_URL}/movie/popular?api_key=${API_KEY}&language=id-ID`;
                }
                ambilDataFilm(currentUrl, false);
                window.scrollTo({top: 0, behavior: 'smooth'});
            }
        });

        function filterKategori(kat, btn) {
            document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentPage = 1;
            if(kat === 'Horor') currentUrl = `${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=27&language=id-ID`;
            else if(kat === 'Komedi') currentUrl = `${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=35&language=id-ID`;
            else if(kat === 'Animasi') currentUrl = `${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=16&language=id-ID`;
            else if(kat === 'Action') currentUrl = `${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=28&language=id-ID`;
            else currentUrl = `${BASE_URL}/movie/popular?api_key=${API_KEY}&language=id-ID`;
            ambilDataFilm(currentUrl, false);
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
