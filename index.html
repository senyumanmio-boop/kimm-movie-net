<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KimmMovie Net - Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* HERO RESPONSIVE */
        #hero-banner {
            height: 55vh;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            position: relative;
            padding: 20px 5%;
            transition: background 0.8s ease-in-out;
        }

        @media (min-width: 768px) { #hero-banner { height: 85vh; align-items: center; } }

        #hero-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #000 5%, transparent 95%);
        }

        .hero-content { position: relative; z-index: 20; }

        /* GRID POSTER BIAR CAKEP DI HP */
        .poster-img {
            height: 240px;
            width: 100%;
            object-fit: cover;
            border-radius: 12px;
            transition: transform 0.3s;
        }
        .poster-img:hover { transform: scale(1.05); }

        @media (min-width: 768px) { .poster-img { height: 350px; } }

        /* HIDE SCROLLBAR */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="text-center px-6">
            <h1 class="text-5xl font-black italic text-red-600 mb-8 tracking-tighter">Kimm<span class="text-white">Movie</span></h1>
            <input type="text" id="userNameInput" placeholder="Nama lo siapa?" class="bg-white/5 p-4 rounded-2xl mb-4 w-full max-w-xs text-center border border-white/10 text-white font-bold outline-none focus:border-red-600">
            <br>
            <button onclick="handleLogin()" class="bg-red-600 w-full max-w-xs py-4 rounded-2xl font-black uppercase tracking-widest">Masuk Gess</button>
        </div>
    </div>

    <div id="main-content" class="hidden opacity-0 transition-opacity duration-1000 pb-32">
        
        <div class="p-5 sticky top-0 z-[100] bg-black/50 backdrop-blur-lg">
            <input type="text" id="searchInput" onkeyup="searchMovies(this.value)" placeholder="Cari film apa hari ini..." class="w-full bg-white/10 border border-white/20 py-3 px-6 rounded-full outline-none focus:border-red-600 text-white text-sm">
        </div>

        <div id="hero-banner">
            <div class="hero-content">
                <h1 id="hero-title" class="text-3xl md:text-7xl font-black italic mb-2 uppercase tracking-tighter">Memuat...</h1>
                <p id="hero-desc" class="text-gray-400 text-[10px] md:text-base mb-4 line-clamp-2 max-w-xl"></p>
                <div class="flex gap-2">
                    <button class="bg-white text-black px-6 py-3 rounded-full font-black text-[10px] uppercase">Mainkan</button>
                    <button class="bg-white/10 border border-white/20 text-white px-6 py-3 rounded-full font-black text-[10px] uppercase">Trailer</button>
                </div>
            </div>
        </div>

        <div class="py-6 space-y-8">
            <div class="px-5">
                <h2 class="text-lg font-black italic uppercase tracking-tighter mb-4">Trending <span class="text-red-600">Terbaru</span></h2>
                <div id="trending-list" class="flex gap-4 overflow-x-auto no-scrollbar"></div>
            </div>

            <div class="px-5">
                <h2 id="section-title" class="text-lg font-black italic uppercase tracking-tighter mb-4">Eksplorasi <span class="text-red-600">Film</span></h2>
                <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-2xl border-t border-white/5 z-[1000] py-4 flex justify-around items-center">
            <button onclick="location.reload()" class="flex flex-col items-center gap-1 text-red-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="text-[9px] font-black">Beranda</span>
            </button>
            <button onclick="document.getElementById('searchInput').focus()" class="flex flex-col items-center gap-1 text-gray-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <span class="text-[9px] font-black">Cari</span>
            </button>
        </nav>
    </div>

    <script>
        const API_KEY = '1306003844bd5fa3d43d44726d5a9cb0';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_PATH = 'https://image.tmdb.org/t/p/w500';

        let currentPage = 1;
        let isLoading = false;
        let isSearching = false;

        function handleLogin() {
            const name = document.getElementById('userNameInput').value;
            if(name.trim() !== "") {
                document.getElementById('login-screen').style.display = 'none';
                const main = document.getElementById('main-content');
                main.classList.remove('hidden');
                setTimeout(() => main.style.opacity = '1', 100);
                initApp();
            }
        }

        async function initApp() {
            // Load Trending & Hero
            const res = await fetch(`${BASE_URL}/trending/movie/week?api_key=${API_KEY}`);
            const data = await res.json();
            setHero(data.results[0]);
            renderHorizontal(data.results);
            
            // Load Infinite Movies
            loadMovies(currentPage);
        }

        async function loadMovies(page) {
            if (isLoading || isSearching) return;
            isLoading = true;
            const res = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=id-ID&page=${page}`);
            const data = await res.json();
            renderGrid(data.results);
            isLoading = false;
        }

        async function searchMovies(query) {
            const grid = document.getElementById('movie-grid');
            const title = document.getElementById('section-title');
            
            if (query.length < 3) {
                if(isSearching) {
                    isSearching = false;
                    grid.innerHTML = "";
                    currentPage = 1;
                    loadMovies(currentPage);
                    title.innerHTML = "Eksplorasi <span class='text-red-600'>Film</span>";
                }
                return;
            }

            isSearching = true;
            title.innerHTML = `Hasil Pencarian: <span class='text-red-600'>${query}</span>`;
            const res = await fetch(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${query}`);
            const data = await res.json();
            grid.innerHTML = ""; // Bersihkan grid untuk hasil cari
            renderGrid(data.results);
        }

        // INFINITE SCROLL LOGIC
        window.onscroll = () => {
            if (!isSearching && (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                currentPage++;
                loadMovies(currentPage);
            }
        };

        function renderHorizontal(movies) {
            const container = document.getElementById('trending-list');
            container.innerHTML = movies.map(m => `
                <div onclick="bukaFilm(${m.id})" class="min-w-[140px] cursor-pointer">
                    <img src="${IMG_PATH + m.poster_path}" class="w-full h-48 object-cover rounded-xl border border-white/10">
                    <h3 class="text-[9px] font-bold mt-2 truncate uppercase text-gray-400">${m.title}</h3>
                </div>
            `).join('');
        }

        function renderGrid(movies) {
            const container = document.getElementById('movie-grid');
            container.innerHTML += movies.map(m => `
                <div onclick="bukaFilm(${m.id})" class="cursor-pointer">
                    <img src="${m.poster_path ? IMG_PATH + m.poster_path : 'https://via.placeholder.com/500x750?text=No+Image'}" class="poster-img border border-white/5 shadow-2xl">
                    <h3 class="text-[10px] font-black mt-2 truncate uppercase text-red-600">${m.title}</h3>
                </div>
            `).join('');
        }

        function setHero(m) {
            document.getElementById('hero-banner').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;
            document.getElementById('hero-title').innerText = m.title;
            document.getElementById('hero-desc').innerText = m.overview;
        }

        function bukaFilm(id) {
            window.open(`https://vidsrc.to/embed/movie/${id}`, '_blank');
        }
    </script>
</body>
</html>
